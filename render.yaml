services:
  - type: web
    name: sim-deal-auditor
    runtime: python
    buildCommand: bash build.sh
    startCommand: streamlit run app.py --server.port $PORT --server.address 0.0.0.0
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: PLAYWRIGHT_BROWSERS_PATH
        value: /opt/render/project/.playwright
    autoDeploy: true
